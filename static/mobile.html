<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>文件传输 - 手机版</title>
    <link rel="stylesheet" href="/static/mobile.css?v=3" />
  </head>
  <body>
    <main class="mobile-page">
      <section class="mobile-card hero-card">
        <p class="eyebrow">Mobile Transfer</p>
        <div class="hero-head">
          <div>
            <h1>文件传输</h1>
            <p class="lede">为手机浏览器简化的收发界面。进入同一房间后，可选目标设备、发送单个文件并互发消息。</p>
          </div>
          <a id="openDesktopLink" class="switch-link" href="/?view=desktop">打开桌面版</a>
        </div>
        <div class="form-stack">
          <label>
            <span>显示名</span>
            <input id="displayName" type="text" maxlength="32" placeholder="这台设备的名字" />
          </label>
          <label>
            <span>房间码</span>
            <input id="roomCode" type="text" maxlength="24" placeholder="例如 TF-ROOM-01" />
          </label>
        </div>
        <div class="button-row">
          <button id="connectBtn" type="button">进入房间</button>
          <button id="disconnectBtn" type="button" class="ghost" disabled>离开房间</button>
        </div>
        <div class="status-strip">
          <span id="connectionBadge" class="badge muted">未连接</span>
          <span id="peerCount" class="badge muted">0 台设备</span>
          <span id="localClientId" class="badge muted">-</span>
        </div>
      </section>

      <section class="mobile-card">
        <div class="section-head">
          <h2>设备</h2>
          <span class="subtle">当前目标：<strong id="selectedPeerName">-</strong></span>
        </div>
        <div id="peerList" class="peer-list empty">房间里还没有其他设备。</div>
        <div id="pendingTransfers" class="pending-list empty">当前没有待确认传输。</div>
      </section>

      <section class="mobile-card">
        <div class="section-head">
          <h2>发送文件</h2>
          <span id="sendHint" class="badge muted">等待目标设备</span>
        </div>
        <label class="upload-button">
          选择单个文件
          <input id="fileInput" type="file" hidden />
        </label>
        <div id="selectionList" class="selection-list empty">还没有选择文件。</div>
        <button id="sendBtn" type="button" disabled>发送给当前设备</button>
      </section>

      <section class="mobile-card">
        <div class="section-head">
          <h2>消息</h2>
          <span id="chatHint" class="badge muted">等待目标设备</span>
        </div>
        <div id="chatList" class="chat-list empty">先选择一台设备开始互发消息。</div>
        <div class="chat-compose">
          <textarea id="chatInput" rows="3" maxlength="1000" placeholder="输入要发送的消息"></textarea>
          <button id="chatSendBtn" type="button" disabled>发送消息</button>
        </div>
      </section>

      <section class="mobile-card">
        <div class="section-head">
          <h2>状态</h2>
          <div class="button-row compact">
            <button id="transferActionBtn" type="button" class="ghost small" hidden>停止传输</button>
            <span id="transferBadge" class="badge muted">空闲</span>
          </div>
        </div>
        <div id="statusList" class="status-list empty">进入房间后，这里会显示传输和连接状态。</div>
      </section>
    </main>

    <template id="peerCardTemplate">
      <button class="peer-card" type="button">
        <div>
          <strong class="peer-name"></strong>
          <p class="peer-meta"></p>
        </div>
        <span class="peer-badge badge muted"></span>
      </button>
    </template>

    <template id="pendingTransferTemplate">
      <div class="pending-card">
        <div>
          <strong class="pending-title"></strong>
          <p class="pending-meta"></p>
        </div>
        <div class="button-row compact">
          <button class="accept-btn" type="button">接收</button>
          <button class="reject-btn ghost" type="button">拒绝</button>
        </div>
      </div>
    </template>

    <script type="module" src="/static/mobile.js?v=3"></script>
  </body>
</html>
